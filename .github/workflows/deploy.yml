name: Deploy to GitHub Pages

# Publishes the built site by force-pushing it to the `gh-pages` branch, which
# is this repo's Pages source (legacy branch build). We moved off the
# actions/deploy-pages pipeline: its finalize step failed persistently for this
# site ("Deployment failed, try again later") while branch-based publishing —
# the same pipeline the user site uses — works reliably.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          # Project site lives at IsaacSauer.github.io/toolbox/, so assets must
          # be based under /toolbox/ (see vite.config.ts).
          GITHUB_PAGES: 'true'
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          # Public URLs → repository Variables, not Secrets. Unset falls back to
          # Supabase edge functions / disables cinepro playback respectively.
          VITE_FUNCTIONS_URL: ${{ vars.VITE_FUNCTIONS_URL }}
          VITE_CINEPRO_URL: ${{ vars.VITE_CINEPRO_URL }}
      - name: Publish to gh-pages branch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          touch dist/.nojekyll   # skip Jekyll; serve the built files as-is
          cd dist
          git init -q -b gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -q -m "Deploy ${GITHUB_SHA}"
          git push -f "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" gh-pages
